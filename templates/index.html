<!DOCTYPE html>
<html>
<head>
    <title>Mould Generator</title>
</head>
<body>

<h2>MOULD DESIGN GENERATOR</h2>

<form method="POST">

    <label>Mould Type:</label>
    <select name="mould">
        <option value="brick">Brick</option>
        <option value="zigzag">Zig-Zag</option>
        <option value="ishape">I-Shape</option>
    </select>

    <br><br>

    <label>Cavities:</label>
    <select name="cavities">
        <option>3</option>
        <option>4</option>
        <option>6</option>
        <option>8</option>
        <option>9</option>
        <option>10</option>
        <option>12</option>
    </select>

    <br><br>

    <button type="submit">Generate Mould PDF</button>

</form>

</body>
</html>
